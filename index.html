  <script>
function autoScaleText() {
  const el = document.getElementById("username");
  const parent = el.parentElement;

  let fontSize = 22; // max size
  el.style.fontSize = fontSize + "px";

  while (el.scrollWidth > parent.clientWidth && fontSize > 10) {
    fontSize--;
    el.style.fontSize = fontSize + "px";
  }
}

window.addEventListener("load", autoScaleText);
window.addEventListener("resize", autoScaleText);
</script>
  
body {
    margin: 0;
    font-family: "Poppins", sans-serif;
    background: #a05cf6;
    display: flex;
    justify-content: center;
    padding: 40px;
}

.wrapper {
    width: 380px;
    background: rgba(255,255,255,0.12);
    border-radius: 25px;
    padding: 25px;
    border: 2px solid rgba(255,255,255,0.35);
}

.grid-area {
    background-image:
        linear-gradient(#ffffff25 1px, transparent 1px),
        linear-gradient(90deg, #ffffff25 1px, transparent 1px);
    background-size: 35px 35px;
    border-radius: 20px;
    padding: 25px;
    text-align: center;
}

.profile-pic {
    width: 115px;
    height: 115px;
    border-radius: 50%;
    border: 4px solid #fff;
    object-fit: cover;
    margin-bottom: 10px;
}

.username {
    color: white;
    font-size: 22px;
    margin: 0;
    font-weight: 600;
    white-space: nowrap;
    transition: font-size 0.2s ease;
}

.bio {
    color: #eee;
    font-size: 14px;
    margin: 5px 0 15px;
}

.socials {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-bottom: 20px;
}

.socials a {
    font-size: 28px;
    color: white;
    transition: 0.25s;
}

.socials a:hover {
    transform: scale(1.15);
    opacity: 0.8;
}

.links {
    display: flex;
    flex-direction: column;
    gap: 15px;
    align-items: center;
    margin-bottom: 25px;
}

.link-btn {
    width: 90%;
    background: #ff68c0;
    border: 3px solid black;
    padding: 15px;
    border-radius: 12px;
    font-size: 17px;
    color: black;
    text-decoration: none;
    font-weight: 600;
    transition: 0.25s;
}

.link-btn:hover {
    transform: scale(1.05);
    background: #ff76cc;
}

/* CONTACT FORM */
.contact-box {
    margin-top: 60px;
    padding: 20px;
    background: rgba(255,255,255,0.18);
    border-radius: 25px;
    border: 1.5px solid rgba(255,255,255,0.25);
    position: relative;
}

.contact-box h3 {
    color: white;
    font-size: 16px;
    margin-bottom: 12px;
    font-weight: 600;
}
.contact-box form{ 
  display: flex;
  flex-direction: column;
  gap: 15px;
}
.contact-box input,
.contact-box textarea {
    width: 100%;
    padding: 12px 15px;
    border-radius: 15px;
    border: none;
    outline: none;
    font-family: "Poppins", sans-serif;
    font-size: 14px;
    box-sizing: border-box;
}

.contact-box textarea {
    resize: none;
    min-height: 120px;
}

.contact-box button {
    width: 100%;
    padding: 14px;
    border-radius: 16px;
    border: 3px solid black;
    background: #ff68c0;
    color: black;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: 0.25s;
}

.contact-box button:hover {
    transform: scale(1.05);
    background: #ff76cc;
}

.footer {
    margin-top: 16px;
    text-align: center;
    color: white;
    font-size: 12px;
}
