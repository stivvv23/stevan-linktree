<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title> Stevan | Linktree </title>

<link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png">
<link rel="manifest" href="favicon_io/site.webmanifest">
<link rel="icon" href="favicon_io/favicon.ico">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: "Poppins", sans-serif;
    background: #a05cf6;
    display: flex;
    justify-content: center;
    padding: 40px;
}

.wrapper {
    width: 380px;
    background: rgba(255,255,255,0.12);
    border-radius: 25px;
    padding: 25px;
    border: 2px solid rgba(255,255,255,0.35);
}

.grid-area {
    background-image:
        linear-gradient(#ffffff25 1px, transparent 1px),
        linear-gradient(90deg, #ffffff25 1px, transparent 1px);
    background-size: 35px 35px;
    border-radius: 20px;
    padding: 25px;
    text-align: center;
}

.profile-pic {
    width: 115px;
    height: 115px;
    border-radius: 50%;
    border: 4px solid #fff;
    object-fit: cover;
    margin-bottom: 10px;
}

/* 🔥 FINAL USERNAME FIX */
.username {
    margin: 0;
    font-weight: 700;
    letter-spacing: 0.5px;

    white-space: nowrap;
    overflow: hidden;

    display: block;
    text-align: center;

    font-size: 26px;

    color: rgba(255,255,255,0.95);

    text-shadow:
        0 2px 8px rgba(0,0,0,0.6),
        0 0 10px rgba(0,0,0,0.3);
}

.bio {
    color: #eee;
    font-size: 14px;
    margin: 5px 0 15px;
}

.socials {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-bottom: 20px;
}

.socials a {
    font-size: 28px;
    color: white;
    transition: 0.25s;
}

.socials a:hover {
    transform: scale(1.15);
    opacity: 0.8;
}

.links {
    display: flex;
    flex-direction: column;
    gap: 15px;
    align-items: center;
    margin-bottom: 25px;
}

.link-btn {
    width: 90%;
    background: #ff68c0;
    border: 3px solid black;
    padding: 15px;
    border-radius: 12px;
    font-size: 17px;
    color: black;
    text-decoration: none;
    font-weight: 600;
    transition: 0.25s;
}

.link-btn:hover {
    transform: scale(1.05);
    background: #ff76cc;
}

.contact-box {
    margin-top: 60px;
    padding: 20px;
    background: rgba(255,255,255,0.18);
    border-radius: 25px;
    border: 1.5px solid rgba(255,255,255,0.25);
}

.contact-box h3 {
    color: white;
    font-size: 16px;
    margin-bottom: 12px;
}

.contact-box form {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.contact-box input,
.contact-box textarea {
    width: 100%;
    padding: 12px;
    border-radius: 15px;
    border: none;
    outline: none;
}

.contact-box textarea {
    min-height: 120px;
}

.contact-box button {
    padding: 14px;
    border-radius: 16px;
    border: 3px solid black;
    background: #ff68c0;
    font-weight: 600;
    cursor: pointer;
}

.footer {
    margin-top: 16px;
    text-align: center;
    color: white;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="grid-area">

    <img src="https://ugc.production.linktr.ee/0ef1242e-f8e6-49b2-9969-683b420da08b_WhatsApp-Image-2025-11-14-at-13.46.06.jpeg" class="profile-pic">

    <h2 class="username">Stevan William Christharyanto</h2>

    <p class="bio">an INFP who loves nature, new things, and loves things in the field of technology</p>

    <div class="socials">
      <a href="#"><i class="fab fa-instagram"></i></a>
      <a href="#"><i class="fab fa-tiktok"></i></a>
      <a href="#"><i class="fab fa-github"></i></a>
      <a href="#"><i class="fab fa-youtube"></i></a>
    </div>

    <div class="links">
      <a class="link-btn" href="#">TikTok</a>
      <a class="link-btn" href="#">Instagram</a>
      <a class="link-btn" href="#">GitHub</a>
      <a class="link-btn" href="#">YouTube</a>
    </div>

    <div class="contact-box">
      <h3>Contact Me</h3>
      <form>
        <input type="text" placeholder="Nama kamu">
        <textarea placeholder="Tulis pesan..."></textarea>
        <button>Kirim Pesan</button>
      </form>
    </div>

    <div class="footer">© 2026 Stevan William C.</div>

  </div>
</div>

<script>
function autoScaleText() {
  const el = document.querySelector(".username");
  const parent = document.querySelector(".wrapper");

  let max = 26;
  let min = 18; // biar ga kekecilan

  let size = max;
  el.style.fontSize = size + "px";

  while (el.scrollWidth > parent.clientWidth - 60 && size > min) {
    size--;
    el.style.fontSize = size + "px";
  }
}

window.addEventListener("load", autoScaleText);
window.addEventListener("resize", autoScaleText);
</script>

</body>
</html>
